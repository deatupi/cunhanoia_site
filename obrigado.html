<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensagem Enviada | Cunha Noia Advocacia</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --td: #1B5E64;
            --w: #FFFFFF;
            --tx: #1a1a1a;
            --fh: 'Sora', sans-serif;
            --fb: 'Roboto', sans-serif;
        }
        body {
            font-family: var(--fb);
            background-color: var(--w);
            color: var(--tx);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
        }
        h1 {
            font-family: var(--fh);
            color: var(--td);
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: #4a5568;
        }
        .btn {
            background-color: var(--td);
            color: var(--w);
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#1B5E64" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px;">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        <h1>Mensagem Enviada!</h1>
        <p>Agradecemos o seu contato. O Dr. Luciano Cunha Noia ou nossa equipe entrará em contato com você o mais breve possível.</p>
        <a href="/" class="btn">Voltar para o site</a>
    </div>
</body>
</html>
